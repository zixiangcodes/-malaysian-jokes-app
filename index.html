<!doctype html>
<html>

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
    <link rel="icon" href="images/vecteezy_circle-flag-of-malaysia_11571450.png" type="image/x-icon">
    <title>Malaysian Jokes Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">

    <!-- Open Graph (for Discord, Facebook, etc.) -->
    <meta property="og:title" content="Malaysian Jokes Generator">
    <meta property="og:description" content="A fun app to generate Malaysian jokes! 😆">
    <meta property="og:image"
        content="https://malaysian-jokes.netlify.app/images/malaysian-jokes-pic-v2-compressed.jpg">
    <meta property="og:url" content="https://malaysian-jokes.netlify.app">
    <meta property="og:type" content="website">
</head>

<body>
    <div class="container">
        <hr>
        <h1>
            <!-- <span class="icon material-symbols-outlined">person_celebrate</span> -->
            <img src="images/vecteezy_circle-flag-of-malaysia_11571450.png" alt="Malaysian Flag" class="flag">
            Malaysian Jokes Generator
        </h1>

        <p><b>Cause why not lah!!? 😆</b></p>
        <p class="display" id="joke-display"></p>
        <hr>
        <div class="buttons-section">
            <div class="btn-row btn-row-top">
                <button class="first-joke-button" id="firstJokeButton">First Joke</button>
                <button class="last-joke-button" id="lastJokeButton">Last Joke</button>
            </div>

            <div class="btn-row btn-row-nav">
                <button class="nav-buttons" id="prevJokeButton">← Previous</button>
                <button class="nav-buttons" id="nextJokeButton">Next →</button>
            </div>

            <div class="btn-row btn-row-random">
                <button class="random-jokes-button" id="generateRandomJokeButton">🎲 Random Joke </button>
            </div>

            <div class="btn-row btn-row-add">
                <button class="btn-secondary" id="toggleFormButton">+ Add a Joke</button>
            </div>

            <div class="btn-row btn-row-share">
                <button class="share-button" id="shareAppButton">🔗 Share Link</button>
            </div>

            <p id="shareMessage" style="display: none"></p>
            <p id="successMessage" style="display: none">🥳 Joke added successfully! 🎉</p>
            <p id="boundaryMessage" style="display: none"></p>
            <form id="jokeForm" class="hidden" autocomplete="off">
                <label for="jokeInput">Add your Joke:</label>
                <textarea id="jokeInput" rows="4" placeholder="Type your joke here..."></textarea>
                <p id="jokeCharCounter" aria-live="polite">0 / 50 characters</p>
                <button class="submit-button" type="submit">Submit</button>
            </form>
        </div>
        <!-- <div>
            <button id="deleteJokeButton" class="btn-delete">Delete Current Joke 🗑️</button>
            <p id="deleteMessage" style="display: none">🗑️ Joke deleted successfully! 🎉</p>
        </div> -->
        <hr class="divider">

        <p class="footer">
            By: Zack Ng &nbsp;|&nbsp; Last Updated: 15 April 2026, V1.0 &nbsp;|&nbsp; Firebase Realtime Database
        </p>
        <p class="footer">
            Credits: Circle flag of Malaysia. Free PNG by stu - khaii at
            <a href="https://www.vecteezy.com/png/11571450-circle-flag-of-malaysia" target="_blank"
                rel="noopener noreferrer">Vecteezy</a>
        </p>
        <p id="jokeCounter">Total Jokes in Database: 0</p>

        <hr class="divider">

    </div>
    <script src="index.js" type="module"></script>
</body>

</html>
